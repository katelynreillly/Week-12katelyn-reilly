<!DOCTYPE html>
<html>
<head>
  <title>Midnight Brew Café</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Toggle Button -->
  <button id="toggle-mode">Toggle Day/Night Mode</button>

  <h1>☕ Midnight Brew Café</h1>

  <!-- Description (REQUIRED) -->
  <p>
    Midnight Brew Café is a cozy and modern coffee shop designed for both daytime energy
    and late-night relaxation. It’s a perfect place to grab coffee, study, or hang out with friends.
  </p>

  <!-- Image (REQUIRED) -->
  <img id="cafe-img" src="./cafe-day.jpg" alt="Midnight Brew Café" width="400">

  <h2>Our Menu</h2>
  <ul id="menu-list"></ul>

  <!-- Daily Special Button -->
  <button id="show-special">Show Daily Special</button>
  <p id="daily-special"></p>

  <script src="script.js"></script>
</body>
</html>
